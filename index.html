<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VocalFlow Windows Clone</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .glow-purple,
    .glow-blue {
      position: absolute;
      width: 500px;
      height: 500px;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }

    .glow-purple {
      background: radial-gradient(circle, rgba(168,85,247,0.4), transparent 70%);
      top: 10%;
      left: 15%;
    }

    .glow-blue {
      background: radial-gradient(circle, rgba(59,130,246,0.4), transparent 70%);
      bottom: 10%;
      right: 15%;
    }
  </style>
</head>

<body class="bg-black text-white min-h-screen flex items-center justify-center relative overflow-hidden">

  <!-- Glow Background -->
  <div class="glow-purple"></div>
  <div class="glow-blue"></div>

  <!-- Main Card -->
  <div class="bg-gray-900/60 backdrop-blur-lg p-8 rounded-2xl shadow-2xl border border-gray-700 w-[600px] relative z-10 text-center">

    <!-- Title -->
    <h1 class="text-4xl font-semibold mb-6 tracking-wide">
      VocalFlow
    </h1>

    <!-- Buttons -->
    <div class="flex justify-center gap-4 mb-4">
      <button id="startBtn"
        onclick="startRecording()"
        class="bg-purple-500 hover:bg-purple-600 px-6 py-2 rounded-lg transition duration-200 shadow-md hover:scale-105">
        Start
      </button>

      <button onclick="stopRecording()"
        class="bg-red-500 hover:bg-red-600 px-6 py-2 rounded-lg transition duration-200 shadow-md hover:scale-105">
        Stop
      </button>
    </div>

    <!-- Status -->
    <p id="status" class="text-sm text-gray-400 mb-4">
      Status: Idle
    </p>

    <p id="recordingIndicator" class="text-xs text-red-400 mb-2 hidden">
  🔴 Recording...
</p>

    <!-- Textarea -->
    <textarea id="output"
  class="w-full h-32 p-4 rounded-xl text-black resize-none focus:outline-none shadow-xl border border-gray-300"
  placeholder="Your speech will appear here..."></textarea>

   <p id="charCount" class="text-xs text-gray-500 mt-1">0 characters</p>

    

   <div class="mt-4 flex justify-center gap-3">

  <button onclick="copyText()"
    class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm transition duration-200 shadow-md hover:scale-105">
    Copy Text
  </button>

  <button onclick="clearText()"
    class="bg-gray-700 hover:bg-gray-800 px-4 py-2 rounded-lg text-sm transition duration-200 shadow-md hover:scale-105">
    Clear
  </button>

</div>

    <!-- Balance -->
    <div class="mt-6 text-sm text-gray-400">
      <p id="deepgramBalance"></p>
      <p id="grokBalance"></p>
    </div>

  </div>

  <script type="module" src="script.js"></script>

</body>
</html>
